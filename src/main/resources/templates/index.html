<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블로그 글 생성기</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <header>
            <h1>✍️ 블로그 글 생성기</h1>
            <p class="subtitle">사진과 메모만 올리면 AI가 블로그 글을 만들어 드려요</p>
        </header>

        <div class="error-message" id="errorMessage" style="display:none"></div>

        <!-- 입력 폼 -->
        <div id="inputSection">
            <form id="generateForm">
                <section class="upload-section">
                    <h2>📸 사진 업로드</h2>
                    <div class="dropzone" id="dropzone">
                        <input type="file" name="images" id="imageInput" multiple
                               accept="image/jpeg,image/png,image/gif,image/webp" class="file-input">
                        <div class="dropzone-content">
                            <span class="dropzone-icon">📷</span>
                            <p>사진을 드래그하거나 클릭하여 업로드</p>
                            <p class="dropzone-hint">최대 10장, JPG/PNG/GIF 지원</p>
                        </div>
                    </div>
                    <div class="preview-grid" id="previewGrid"></div>
                </section>

                <section class="memo-section">
                    <h2>📝 메모</h2>
                    <textarea name="memo" id="memo" rows="6"
                              placeholder="예시:&#10;성수동 크림파스타 맛집&#10;사진1: 외관 - 골목 안쪽에 있음&#10;사진2: 크림파스타 - 진짜 맛있었음, 2만원&#10;사진3: 디저트 티라미수 - 서비스로 줌"></textarea>
                </section>

                <section class="style-section">
                    <h2>🎨 글 스타일</h2>
                    <div class="style-options">
                        <label th:each="s : ${styles}" class="style-option">
                            <input type="radio" name="style" th:value="${s.name()}"
                                   th:checked="${s.name() == 'CASUAL'}">
                            <span class="style-label" th:text="${s.displayName}"></span>
                            <span class="style-desc" th:text="${s.promptDescription}"></span>
                        </label>
                    </div>
                </section>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">글 생성하기</span>
                    <span class="btn-loading" style="display:none">⏳ 생성 중... (30초~1분 소요)</span>
                </button>
            </form>
        </div>

        <!-- 결과 영역 (동적 표시) -->
        <div id="resultSection" style="display:none">
            <div class="result-container">
                <div class="result-header">
                    <h2>📋 생성된 블로그 글</h2>
                    <div class="result-actions">
                        <button class="copy-btn" onclick="copyHtml()">HTML 복사</button>
                        <button class="copy-btn secondary" onclick="copyText()">텍스트 복사</button>
                    </div>
                </div>

                <div class="result-content">
                    <h3 class="post-title" id="postTitle"></h3>
                    <div class="post-body" id="postBody"></div>
                </div>

                <div class="image-guide" id="imageGuide" style="display:none">
                    <h3>📷 사진 삽입 가이드</h3>
                    <ul id="imageGuideList"></ul>
                </div>

                <section class="revise-section">
                    <h3>💬 수정 요청</h3>
                    <div class="revise-form">
                        <input type="text" id="reviseInput"
                               placeholder="예: 제목 좀 더 짧게 바꿔줘, 마지막 문단 삭제해줘">
                        <button class="revise-btn" id="reviseBtn" onclick="revisePost()">수정</button>
                    </div>
                    <div class="revise-loading" id="reviseLoading" style="display:none">
                        ⏳ 수정 중...
                    </div>
                </section>
            </div>

            <button class="submit-btn secondary-full" onclick="backToEdit()" style="margin-top:1rem">
                ← 새 글 작성하기
            </button>
        </div>

        <input type="hidden" id="sessionId" value="">
        <input type="hidden" id="plainText" value="">
    </div>

    <div class="toast" id="toast"></div>

    <script th:src="@{/js/app.js}"></script>
</body>
</html>
